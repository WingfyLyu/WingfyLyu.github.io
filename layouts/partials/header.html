<header class="header">
    <nav class="nav container">
        <a href="{{ "/" | relURL }}" class="logo">
            <span class="logo-bracket">&lt;</span>
            <span class="logo-text">{{ .Site.Params.author }}</span>
            <span class="logo-bracket">/&gt;</span>
        </a>
        <div class="nav-menu">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" class="nav-link">{{ .Name }}</a>
            {{ end }}
        </div>
        <div class="nav-actions">
            <button class="lang-toggle" aria-label="{{ i18n "switchLanguage" }}">
                <span class="lang-text">{{ if eq .Site.Language.Lang "zh" }}EN{{ else }}中{{ end }}</span>
            </button>
            <button class="theme-toggle" aria-label="{{ i18n "switchLanguage" }}">
                <span class="theme-icon light">☀️</span>
                <span class="theme-icon dark">🌙</span>
            </button>
            <button class="nav-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>
</header>
